{% load i18n %}
<script>
  // Setup dates - using local timezone offset to get correct YYYY-MM-DD
  const userNow = new Date();
  userNow.setMinutes(userNow.getMinutes() - userNow.getTimezoneOffset());
  const today = userNow.toISOString().split("T")[0];
  document.querySelectorAll(".date-input").forEach(input => {
    input.min = today;
    if (!input.value) input.value = today;
  });

  // UI State Management (Trip Types)
  const radios = document.querySelectorAll('input[name="trip_type"]');
  const returnWrapper = document.getElementById('return_date_wrapper');
  const returnInput = document.getElementById('return_date');
  const addSliceBtn = document.getElementById('addSliceBtn');
  const slicesContainer = document.getElementById('slices-container');
  let sliceCount = 1;

  // Responsive grid helper — on mobile, always use 1 column
  function setSliceGrid(el, desktopCols) {
    el.style.gridTemplateColumns = window.innerWidth <= 800 ? '1fr' : desktopCols;
  }

  function updateUI() {
    const type = document.querySelector('input[name="trip_type"]:checked').value;
    
    // Reset secondary slices if not multicity
    if (type !== 'multicity') {
        const extra = document.querySelectorAll('.slice-row:not(#slice_0)');
        extra.forEach(el => el.remove());
        sliceCount = 1;
        addSliceBtn.style.display = 'none';
        // Reset grid structure
        setSliceGrid(document.getElementById('slice_0'), '1fr auto 1fr 1fr 1fr');
    }

    if (type === 'oneway') {
      returnWrapper.style.display = 'none';
      returnInput.required = false;
      setSliceGrid(document.getElementById('slice_0'), '1fr auto 1fr 1fr');
    } 
    else if (type === 'roundtrip') {
      returnWrapper.style.display = 'block';
      returnInput.required = true;
      setSliceGrid(document.getElementById('slice_0'), '1fr auto 1fr 1fr 1fr');
    } 
    else if (type === 'multicity') {
      returnWrapper.style.display = 'none';
      returnInput.required = false;
      addSliceBtn.style.display = 'inline-flex';
      setSliceGrid(document.getElementById('slice_0'), '1fr auto 1fr 1fr auto');
      if (sliceCount === 1) {
          addMultiCitySlice();
      }
    }
  }

  // Re-apply grid on resize
  window.addEventListener('resize', updateUI);

  radios.forEach(r => r.addEventListener('change', updateUI));
  updateUI();

  {% if search.trip_type == 'multicity' %}
  if (sliceCount === 2) {
      // Pre-fill the secondary slices using Django loops dynamically!
      // Slice 0 was done in HTML, Slice 1 was triggered by updateUI -> addMultiCitySlice
      let dynamicIndex = 1;
      {% for s in search.slices|slice:"1:" %}
          if (dynamicIndex > 1) {
              addMultiCitySlice();
          }
          document.getElementById('origin_' + dynamicIndex).value = "{{ s.origin|escapejs }}";
          document.getElementById('destination_' + dynamicIndex).value = "{{ s.destination|escapejs }}";
          document.getElementById('departure_date_' + dynamicIndex).value = "{{ s.departure_date|escapejs }}";
          dynamicIndex++;
      {% endfor %}
  }
  {% endif %}

  // Multi-city dynamic rows
  function addMultiCitySlice() {
    if (sliceCount >= 6) return alert("{% trans 'يُسمح بـ' %} 6 {% trans "رحلات كحد أقصى" %}.");
    
    // Auto-fill origin with previous destination
    // Auto-fill origin with previous destination if possible
    let prevDest = "";
    const prevField = document.getElementById(`destination_${sliceCount - 1}`);
    if (prevField) prevDest = prevField.value;
    
    const newRow = document.createElement('div');
    newRow.className = 'slice-row search-grid';
    newRow.id = `slice_${sliceCount}`;
    newRow.style.gridTemplateColumns = '1fr auto 1fr 1fr auto';
    newRow.style.marginTop = '16px';
    
    newRow.innerHTML = `
      <div class="form-field autocomplete-wrapper">
        <div class="input-icon-wrap">
          <span class="fi">🛫</span>
          <input type="text" name="origin_${sliceCount}" id="origin_${sliceCount}" value="${prevDest}" placeholder="{% trans 'المغادرة' %}" required class="field-input autocomplete-input" autocomplete="off">
        </div>
        <div class="autocomplete-dropdown" id="dropdown_origin_${sliceCount}" style="display: none;"></div>
      </div>

      <div class="invisible-spacer" style="width: 44px;"></div>

      <div class="form-field autocomplete-wrapper">
        <div class="input-icon-wrap">
          <span class="fi">🛬</span>
          <input type="text" name="destination_${sliceCount}" id="destination_${sliceCount}" placeholder="{% trans 'الوجهة' %}" required class="field-input autocomplete-input" autocomplete="off">
        </div>
        <div class="autocomplete-dropdown" id="dropdown_destination_${sliceCount}" style="display: none;"></div>
      </div>

      <div class="form-field">
        <div class="input-icon-wrap">
          <span class="fi">📅</span>
          <input type="date" name="departure_date_${sliceCount}" id="departure_date_${sliceCount}" required class="field-input date-input" min="${today}" value="${today}">
        </div>
      </div>

      <button type="button" class="btn btn-ghost remove-slice" onclick="this.parentElement.remove(); sliceCount--;" style="color:var(--danger); border-color:var(--danger); border-radius:50%; width:44px; height:44px; padding:0; display:flex; justify-content:center; align-items:center;">✕</button>
    `;
    
    slicesContainer.appendChild(newRow);
    
    // Attach autocomplete to new inputs
    setupAutocomplete(newRow.querySelector(`#origin_${sliceCount}`), newRow.querySelector(`#dropdown_origin_${sliceCount}`));
    setupAutocomplete(newRow.querySelector(`#destination_${sliceCount}`), newRow.querySelector(`#dropdown_destination_${sliceCount}`));
    
    sliceCount++;
  }

  addSliceBtn.addEventListener('click', addMultiCitySlice);

  // Swap logic for row 0
  document.getElementById("swapBtn_0").addEventListener("click", () => {
    const o = document.getElementById("origin_0");
    const d = document.getElementById("destination_0");
    [o.value, d.value] = [d.value, o.value];
    o.classList.add("flash"); d.classList.add("flash");
    setTimeout(() => { o.classList.remove("flash"); d.classList.remove("flash"); }, 400);
  });

  // ========== API AUTOCOMPLETE ==========
  
  // Debounce helper
  function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => { clearTimeout(timeout); func(...args); };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }

  function setupAutocomplete(input, dropdown) {
    input.addEventListener('input', debounce(async (e) => {
        const query = e.target.value.trim();
        if (query.length < 2) {
            dropdown.style.display = 'none';
            return;
        }

        try {
            const resp = await fetch(`/api/places/?q=${encodeURIComponent(query)}`);
            const data = await resp.json();
            
            if (data.results && data.results.length > 0) {
                dropdown.innerHTML = '';
                data.results.forEach(place => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    const icon = place.type === 'airport' ? '✈️' : '🏙️';
                    const arabicLabel = place.arabic_name ? `<span style="color:var(--primary); font-size:0.85rem; margin-right:4px;">${place.arabic_name}</span>` : '';
                    let subText = place.city_name || '';
                    if (place.type === 'city') {
                        subText = '{% trans "جميع المطارات" %}';
                    } else if (subText.toLowerCase() === (place.name || '').toLowerCase()) {
                        subText = '';
                    }
                    
                    div.innerHTML = `
                        <span class="ac-icon">${icon}</span>
                        <div class="ac-text">
                            <strong>${place.name || ''}</strong> ${arabicLabel}
                            <span class="ac-sub">${subText}</span>
                        </div>
                        <span class="ac-iata">${place.iata_code || ''}</span>
                    `;
                    div.addEventListener('mousedown', (evt) => {
                        // Use mousedown instead of click to fire before blur
                        evt.preventDefault();
                        // Set value with the IATA code so the backend can extract it
                        const selectedValue = `${place.name} (${place.iata_code})`;
                        // Explicitly set the native input value so HTML5 validation is satisfied
                        const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
                        nativeInputValueSetter.call(input, selectedValue);
                        // Dispatch events so React/Vue/native validation all pick it up
                        input.dispatchEvent(new Event('input', { bubbles: true }));
                        input.dispatchEvent(new Event('change', { bubbles: true }));
                        dropdown.style.display = 'none';
                        input.blur();
                    });
                    dropdown.appendChild(div);
                });
                dropdown.style.display = 'block';
            } else {
                dropdown.innerHTML = '<div class="autocomplete-item text-muted">{% trans "لا توجد نتائج" %}</div>';
                dropdown.style.display = 'block';
            }
        } catch (err) {
            console.error(err);
        }
    }, 300));

    // Hide clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.autocomplete-wrapper')) {
            dropdown.style.display = 'none';
        }
    });
  }

  // Setup initial ones
  setupAutocomplete(document.getElementById('origin_0'), document.getElementById('dropdown_origin_0'));
  setupAutocomplete(document.getElementById('destination_0'), document.getElementById('dropdown_destination_0'));


</script>
